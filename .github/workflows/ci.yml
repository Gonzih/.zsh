name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Zsh
        run: sudo apt-get update && sudo apt-get install --yes zsh
      - name: Validate configuration and pinned plugins
        run: ./scripts/install.zsh --no-activate
